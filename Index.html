<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Responsiva Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">
            <h2>Luxury<span>Studio</span></h2>
        </div>
        <ul class="nav-links">
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#galeria">Galería</a></li>
            <li><a href="#servicios">Servicios</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>

    <div class="main-content">
        
        <main id="galeria" class="gallery-section">
            <h1>Nuestra Galería</h1>
            <p>Pasa el cursor sobre las imágenes para descubrir su color.</p>
            
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="https://picsum.photos/600/400?random=1" alt="Proyecto 1">
                </div>
                <div class="gallery-item">
                    <img src="https://picsum.photos/600/400?random=2" alt="Proyecto 2">
                </div>
                <div class="gallery-item">
                    <img src="https://picsum.photos/600/400?random=3" alt="Proyecto 3">
                </div>
                <div class="gallery-item">
                    <img src="https://picsum.photos/600/400?random=4" alt="Proyecto 4">
                </div>
                <div class="gallery-item">
                    <img src="https://picsum.photos/600/400?random=5" alt="Proyecto 5">
                </div>
                <div class="gallery-item">
                    <img src="https://picsum.photos/600/400?random=6" alt="Proyecto 6">
                </div>
            </div>
        </main>

        <footer class="site-footer">
            <div class="footer-info">
                <h3>Contacto</h3>
                <p>Email: info@luxurystudio.com</p>
                <p>Teléfono: +123 456 789</p>
            </div>
            <div class="footer-socials">
                <h3>Síguenos</h3>
                <div class="social-links">
                    <a href="#">Facebook</a>
                    <a href="#">Instagram</a>
                    <a href="#">Pinterest</a>
                </div>
            </div>
        </footer>

    </div>

</body>
</html>
